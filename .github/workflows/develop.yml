name: Deploy on EC2 DEVELOP

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY_DEV }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER_DEV }}@${{ secrets.EC2_IP_DEV }} << 'EOF'
            set -e  # Exit if any command fails
            echo "Loading NVM..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads NVM
            echo "After Loading NVM..."
            # Navigate to your app directory
            cd nestforge
            echo "before pulling code..."
            git pull origin develop
            echo "Before npm i"
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            echo "After npm i"
            
            # Stop the application before updating environment variables
            #pm2 stop nestforge
            pm2 delete nestforge
            
            # Get environment variables from AWS Secrets Manager
            echo "Fetching environment variables from AWS Secrets Manager..."
            aws secretsmanager get-secret-value --secret-id "develop/nestforge" --query 'SecretString' --output text | jq -r 'to_entries[] | "\(.key)=\(.value | @json)"' | sed 's/^"\(.*\)"$/\1/' > .env
            echo "Environment variables updated."
            
            echo "Running npm run build..."
            npm run build
            echo "After npm run build"
            
            #pm2 restart nestforge
            pm2 start dist/src/main.js --name nestforge -i max
            pm2 list
            echo "server is running..."
            pm2 save
            echo "Deployment completed successfully."
          EOF
